[project]
name = "stepopt"
version = "0.1.5"
description = "Optimisation algorithms"
authors = [{ name = "Ashrith Sagar", email = "ashrithy@iisc.ac.in" }]
readme = "./README.md"
requires-python = ">=3.14"
dependencies = ["matplotlib>=3.10.8", "numpy>=2.4.2", "rich>=14.3.2"]

[build-system]
requires = ["uv_build>=0.10.2"]
build-backend = "uv_build"

[dependency-groups]
dev = ["pytest>=9.0.2", "pytest-memray>=1.8.0"]
extra = ["cvxpy>=1.8.1", "scipy>=1.17.0", "scipy-stubs>=1.17.0.2"]
notebook = ["jupyter>=1.1.1"]
